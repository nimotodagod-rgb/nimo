services:
  - type: web
    name: editor-conquistando
    runtime: docker
    dockerfilePath: ./web/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_PIN
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      - key: APP_PLAN_AMOUNT
        sync: false
      - key: APP_PAID_EMAILS
        value: "nimotoda@gmail.com"
      - key: APP_PLAN_TITLE
        value: "Editor Conquistando"
      - key: APP_PUBLIC_URL
        value: "https://editor-conquistando.onrender.com"
      - key: PORT
        value: "10000"
